<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Curious Oxfordshire Map</title>

  <!-- Google Fonts: Plus Jakarta Sans -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" />

  <!-- Leaflet CSS from CDN — no install needed -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- ── Mobile map header (app title overlay, mobile only) ── -->
  <div id="mobile-header" aria-hidden="true">
    <span>Curious Oxfordshire</span>
  </div>

  <!-- ── Sidebar / Bottom sheet ──────────────────────────── -->
  <aside id="sidebar" role="region" aria-label="Places panel">

    <!-- Drag handle (mobile only) -->
    <div id="sheet-handle" role="button" tabindex="0" aria-label="Toggle places panel"></div>

    <h1>Curious Oxfordshire</h1>
    <p class="subtitle">Unusual, interesting &amp; slightly magical places around Buckland and beyond.</p>

    <!-- Search -->
    <div id="search-wrap">
      <span id="search-icon" aria-hidden="true">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      </span>
      <input id="search-input" type="text" placeholder="Search places…" autocomplete="off" />
      <button id="search-clear" title="Clear search" aria-label="Clear search">✕</button>
    </div>

    <!-- Filter buttons -->
    <div id="filters">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn filter-btn-adventure" data-filter="adventures">✦ Adventures</button>
      <button class="filter-btn filter-btn-family" data-filter="family-friendly">👨‍👩‍👧 Family</button>
      <button class="filter-btn" data-filter="hidden-places">Hidden</button>
      <button class="filter-btn" data-filter="events">Events</button>
      <button class="filter-btn" data-filter="nature">Nature</button>
      <button class="filter-btn" data-filter="rainy-day">Rainy Day</button>
      <button class="filter-btn" data-filter="food-or-treats">Food</button>
      <button class="filter-btn" data-filter="strange-or-historic">Historic</button>
      <button class="filter-btn" data-filter="free-or-cheap">Free</button>
    </div>

    <!-- Random adventure button -->
    <button id="random-btn">🎲 Random Adventure</button>

    <!-- Place list — clicking zooms to marker -->
    <div id="place-count"></div>
    <ul id="place-list"></ul>

    <!-- Detail panel (mobile only, shown when a place is selected) -->
    <div id="detail-panel" aria-live="polite"></div>

    <div class="sidebar-footer">
      <span>Sample data — not verified. Check before visiting.</span>
    </div>

  </aside>

  <!-- ── Map ────────────────────────────────────────────── -->
  <div id="map"></div>

  <!-- Leaflet JS from CDN -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- Our data and app logic -->
  <script src="data.js"></script>
  <script src="app.js"></script>
  <script src="voice.js"></script>

</body>
</html>
