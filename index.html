<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Secret Oxfordshire</title>
  <meta name="description" content="Discover unusual, interesting and slightly magical places across Oxfordshire — 3,825 curious spots mapped and searchable." />
  <meta property="og:title" content="Secret Oxfordshire" />
  <meta property="og:description" content="Unusual, interesting &amp; slightly magical places across Oxfordshire." />
  <meta property="og:url" content="https://secretoxfordshire.com" />
  <meta property="og:type" content="website" />
  <meta name="twitter:card" content="summary_large_image" />
  <link rel="canonical" href="https://secretoxfordshire.com" />
  <meta name="theme-color" content="#5c3a1e" />
  <meta name="color-scheme" content="light" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🗺</text></svg>" />

  <!-- Google Fonts: Plus Jakarta Sans -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" />

  <!-- Leaflet CSS from CDN — no install needed -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />

  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- Loading overlay (removed by app.js after initial render) -->
  <div id="map-loader">
    <div class="map-loader-spinner"></div>
    <span>Loading places…</span>
  </div>

  <!-- ── Mobile map header (app title overlay, mobile only) ── -->
  <div id="mobile-header" aria-hidden="true">
    <span>Secret Oxfordshire</span>
  </div>

  <!-- ── Mobile floating search bar (visible on map when sheet collapsed) ── -->
  <div id="mobile-search-bar">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0;opacity:0.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input id="mobile-search-input" type="text" placeholder="Search by name, type, mood…" autocomplete="off" aria-label="Search places" inputmode="search" enterkeyhint="search" />
    <button id="mobile-search-clear" aria-label="Clear search" style="display:none">✕</button>
  </div>

  <!-- ── Sidebar / Bottom sheet ──────────────────────────── -->
  <aside id="sidebar" role="region" aria-label="Places panel">

    <!-- Drag handle (mobile only) -->
    <div id="sheet-handle" role="button" tabindex="0" aria-label="Toggle places panel">
      <span id="handle-count" aria-hidden="true"></span>
    </div>

    <h1>Secret Oxfordshire</h1>
    <p class="subtitle">Unusual, interesting &amp; slightly magical places across Oxfordshire.</p>

    <!-- Search -->
    <div id="search-wrap">
      <span id="search-icon" aria-hidden="true">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      </span>
      <input id="search-input" type="text" placeholder="Search by name, type, mood…" autocomplete="off" aria-label="Search places" />
      <button id="search-clear" title="Clear search" aria-label="Clear search">✕</button>
    </div>

    <!-- Filter buttons -->
    <div id="filters">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn filter-btn-adventure" data-filter="adventures">✦ Adventures</button>
      <button class="filter-btn filter-btn-family" data-filter="family-friendly">👨‍👩‍👧 Family</button>
      <button class="filter-btn" data-filter="hidden-places">🔍 Hidden</button>
      <button class="filter-btn" data-filter="events">Events</button>
      <button class="filter-btn" data-filter="nature">🌿 Nature</button>
      <button class="filter-btn" data-filter="rainy-day">☔ Rainy Day</button>
      <button class="filter-btn" data-filter="food-or-treats">🍎 Food</button>
      <button class="filter-btn" data-filter="strange-or-historic">Strange &amp; Historic</button>
      <button class="filter-btn" data-filter="free-or-cheap">💚 Free</button>
      <button class="filter-btn filter-btn-lost" data-filter="lost-places">🏚 Lost Places</button>
      <button class="filter-btn filter-btn-underground" data-filter="underground">⛏ Underground</button>
      <button class="filter-btn filter-btn-screen" data-filter="screen-and-page">📖 On Screen &amp; Page</button>
      <button class="filter-btn filter-btn-nightsky" data-filter="night-sky">★ Night Sky</button>
      <button class="filter-btn filter-btn-wartime" data-filter="wartime">⚔ Wartime</button>
      <button class="filter-btn filter-btn-folklore" data-filter="folklore">🌀 Folklore</button>
      <button class="filter-btn filter-btn-industrial" data-filter="industrial-ruin">🏭 Industrial Ruins</button>
      <button class="filter-btn filter-btn-eccentric" data-filter="eccentric">🎩 Eccentric</button>
      <button class="filter-btn filter-btn-sonic" data-filter="sonic">🎵 Sonic Places</button>
      <button class="filter-btn filter-btn-saved" data-filter="saved">❤️ Saved</button>
    </div>

    <!-- Date / period filter -->
    <div id="date-filter-wrap">
      <button id="date-toggle" aria-expanded="false" aria-controls="date-filter-inner">📅 Date filter <span id="date-toggle-arrow">▸</span></button>
      <div id="date-filter-inner" hidden>
      <div id="date-presets">
        <button class="date-preset" data-preset="weekend">This weekend</button>
        <button class="date-preset" data-preset="next-week">Next week</button>
        <button class="date-preset" data-preset="this-month">This month</button>
        <button class="date-preset" data-preset="next-month">Next month</button>
      </div>
      <div id="date-custom-row">
        <span class="date-range-label">From</span>
        <input type="date" id="date-from" aria-label="Start of period" />
        <span class="date-range-label">to</span>
        <input type="date" id="date-to" aria-label="End of period" />
      </div>
      <div id="date-active-bar" hidden>
        <span id="date-active-label"></span>
        <button id="date-clear-btn" aria-label="Clear date filter">✕ Clear</button>
      </div>
      </div><!-- /date-filter-inner -->
    </div>

    <!-- AI chat button (desktop sidebar) -->
    <button id="chat-sidebar-btn">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      <span>
        Ask AI for ideas
        <span style="display:block;font-size:0.7rem;font-weight:400;opacity:0.8;margin-top:1px;">"Rainy day with kids" · "Free walks" · "Weird history"</span>
      </span>
    </button>

    <!-- Random adventure button -->
    <button id="random-btn">🎲 Random Adventure</button>

    <!-- Place list — clicking zooms to marker -->
    <div id="place-count"></div>
    <ul id="place-list"></ul>

    <!-- Detail panel (mobile only, shown when a place is selected) -->
    <div id="detail-panel" aria-live="polite"></div>

    <div class="sidebar-footer">
      <span>Community-curated — check details before visiting.</span>
    </div>

  </aside>

  <!-- ── Map ────────────────────────────────────────────── -->
  <div id="map"></div>

  <!-- Locate me button (floats over map) -->
  <button id="locate-btn" title="Find my location" aria-label="Find my location">
    <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M12 2v3m0 14v3M2 12h3m14 0h3"/><circle cx="12" cy="12" r="9" opacity=".25"/></svg>
  </button>

  <!-- Floating AI chat button (mobile) -->
  <button id="chat-fab" aria-label="Ask AI for recommendations">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
    <span>Ask AI</span>
  </button>

  <!-- AI Chat panel -->
  <div id="chat-panel" hidden aria-label="AI recommendations" role="dialog" aria-modal="true">

    <!-- Main chat UI -->
    <div id="chat-main">
      <div id="chat-header">
        <div class="chat-header-title">
          <span class="chat-header-dot"></span>
          <span>AI Guide</span>
        </div>
        <div class="chat-header-actions">
          <button id="chat-close" aria-label="Close chat">✕</button>
        </div>
      </div>

      <div id="chat-messages" role="log" aria-live="polite"></div>

      <div id="chat-suggestions">
        <button class="chat-sugg">🌧 Fun for kids on a rainy day</button>
        <button class="chat-sugg">💑 Romantic &amp; unusual this weekend</button>
        <button class="chat-sugg">🥾 Free outdoor walks near Oxford</button>
        <button class="chat-sugg">🏺 Weird and historic</button>
        <button class="chat-sugg">🍺 Best local pubs with a story</button>
        <button class="chat-sugg">🌿 Wild swimming spots</button>
      </div>

      <div id="chat-input-wrap">
        <textarea id="chat-input" rows="1" placeholder="What are you looking for today?" autocomplete="off"></textarea>
        <button id="chat-send" aria-label="Send message">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div>
    </div>

  </div>

  <!-- Leaflet JS from CDN -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

  <!-- Our data and app logic -->
  <script src="data.js"></script>
  <script src="app.js"></script>
  <script src="voice.js"></script>
  <script src="chat.js"></script>

</body>
</html>
